# Fully self-contained demo stack — safe to run on the SAME box as the Kotak trading API
# WITHOUT touching it. Its OWN Caddy + app, OWN network, OWN host port (8443).
#
# It does NOT share a network, volume, env file, or port with the `ati` / trading stack, and it
# NEVER edits the trading Caddyfile or compose. Caddy gets a TRUSTED cert via Hostinger DNS-01, so it
# needs no port 80/443 (those stay with the trading Caddy). Tear-down leaves zero residue:
#   docker compose -f deploy/cohost/docker-compose.cohost.yml -p rmdemo down -v
#
# Bring up (from the repo root):
#   export RM_ADMIN_PASSWORD='a-strong-password'
#   export HOSTINGER_API_TOKEN='<token from Hostinger panel, with DNS permission>'
#   docker compose -f deploy/cohost/docker-compose.cohost.yml -p rmdemo up -d --build
#
# Then open  https://schulich.edufund.ca:8443  (trusted cert, own port). See COHOST.md.

services:
  app:
    build:
      context: ../..
      dockerfile: Dockerfile
      args:
        # Install the Claude Code CLI into the image so the Claude backend is available. The image
        # still runs on the deterministic mock engine until CLAUDE_CODE_OAUTH_TOKEN is set below.
        WITH_CLAUDE: "${WITH_CLAUDE:-1}"
    image: rmdemo-app:latest
    container_name: rmdemo-app
    environment:
      RM_ADMIN_USER: "${RM_ADMIN_USER:-admin}"
      RM_ADMIN_PASSWORD: "${RM_ADMIN_PASSWORD:?set RM_ADMIN_PASSWORD before deploying}"
      RM_INFERENCE_BACKEND: "mock"
      RM_AUTOLOAD: "1"
      # Demo matching engine: "claude_cli" uses your Claude subscription via the local CLI (no API
      # key). Falls back to the deterministic engine automatically if the token below is unset.
      RM_DEMO_BACKEND: "${RM_DEMO_BACKEND:-claude_cli}"
      RM_CLAUDE_CLI_MODEL: "${RM_CLAUDE_CLI_MODEL:-opus}"
      # Demo gate: full functionality, limited quantity. Each client gets RM_DEMO_FREE_RUNS scored
      # matches per RM_DEMO_QUOTA_WINDOW_MIN window (re-running the SAME batch is free); a spent client
      # gets a 402 + upgrade prompt. Set RM_DEMO_FREE_RUNS=0 to disable the gate (unlimited).
      RM_DEMO_FREE_RUNS: "${RM_DEMO_FREE_RUNS:-5}"
      RM_DEMO_QUOTA_WINDOW_MIN: "${RM_DEMO_QUOTA_WINDOW_MIN:-1440}"
      # Max roles a client can compare in one multi-job fit grid (scores every résumé × every role).
      RM_DEMO_MAX_JOBS: "${RM_DEMO_MAX_JOBS:-3}"
      # Accounts/saved-projects (persistence tier). Clients reach HTTPS via Caddy, so session cookies
      # must be Secure (HTTPS-only). Persist the SQLite DB on a named volume so saved projects survive
      # redeploys (mount it below). Tokens expire after RM_ACCOUNTS_TOKEN_DAYS.
      RM_COOKIE_SECURE: "${RM_COOKIE_SECURE:-1}"
      RM_ACCOUNTS_DB: "${RM_ACCOUNTS_DB:-/data/accounts.db}"
      RM_ACCOUNTS_TOKEN_DAYS: "${RM_ACCOUNTS_TOKEN_DAYS:-30}"
      # Subscription token from `claude setup-token` (NOT an API key). Set it in deploy/cohost/.env.
      CLAUDE_CODE_OAUTH_TOKEN: "${CLAUDE_CODE_OAUTH_TOKEN:-}"
    expose:
      - "8000"                 # reachable only inside this stack's private network
    networks:
      - rmdemo
    volumes:
      - rmdemo_accounts:/data  # persist accounts + saved projects across redeploys (own volume)
    mem_limit: 512m            # hard caps: the demo cannot starve the trading bot on the same host
    cpus: 0.5
    # Let an in-flight scoring call finish on redeploy/stop before SIGKILL (vision calls run up to
    # RM_CLAUDE_CLI_FILE_TIMEOUT=150s); default 10s would cut them off. Scoped to THIS service only.
    stop_grace_period: 180s
    restart: unless-stopped

  caddy:
    # Custom image: stock Caddy + the Hostinger DNS-01 plugin (see Caddy.hostinger.Dockerfile).
    build:
      context: .
      dockerfile: Caddy.hostinger.Dockerfile
    image: rmdemo-caddy-hostinger:latest
    container_name: rmdemo-caddy
    ports:
      - "${RM_HTTPS_PORT:-8443}:443"      # NOT 443 — that stays with the trading Caddy
    environment:
      RM_PUBLIC_DOMAIN: "${RM_PUBLIC_DOMAIN:-schulich.edufund.ca}"
      # Hostinger API token with DNS permission — used ONLY for the ACME DNS-01 challenge.
      HOSTINGER_API_TOKEN: "${HOSTINGER_API_TOKEN:?set HOSTINGER_API_TOKEN for the DNS-01 trusted cert}"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - rmdemo_caddy_data:/data          # persists the issued cert across restarts
      - rmdemo_caddy_config:/config
    networks:
      - rmdemo
    depends_on:
      - app
    restart: unless-stopped

# Dedicated, named network — isolated from the trading stack's network.
networks:
  rmdemo:
    name: rmdemo_net

# Dedicated volumes (prefixed) — nothing shared with the trading stack.
volumes:
  rmdemo_caddy_data:
  rmdemo_caddy_config:
  rmdemo_accounts:
