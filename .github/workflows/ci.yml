name: ci

on:
  push:
  pull_request:

jobs:
  # Fast matrix: CORE deps only — proves the package, the test suite, and the demo run with no optional
  # libraries installed (FastAPI/pdf/docx tests importorskip here). Mirrors a minimal deployment.
  core:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install core dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Pin the adapter JSON Schema (fails if the contract drifts uncommitted)
        run: python -c "from resume_matcher.inference.schema import write_json_schema; write_json_schema()"
      - name: Run tests (mock backend — no LLM required)
        env:
          RM_INFERENCE_BACKEND: mock
        run: pytest -q
      - name: End-to-end demo smoke
        run: python scripts/run_demo.py

  # Full gate: ALL deps installed so the service / upload / parser tests that importorskip in the core
  # job (auth gate, kill-switch, >1 MB upload, no-PII-echo, pdf/docx parsing) ACTUALLY run and gate the
  # merge. Adds lint, a coverage floor, an honest accuracy regression gate, and an advisory dep audit.
  full:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install full dependencies + dev tools
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-extra.txt
          pip install "ruff==0.15.13" pytest-cov pip-audit
      - name: Lint (ruff)
        run: ruff check resume_matcher scripts tests
      - name: Run tests with coverage floor (full deps — previously-skipped tests now run)
        env:
          RM_INFERENCE_BACKEND: mock
        run: pytest -q --cov=resume_matcher --cov-report=term-missing --cov-fail-under=80
      - name: Accuracy regression gate (mock baseline; realistic + smoke sets)
        run: python scripts/eval_accuracy.py --all --check
      - name: Dependency vulnerability audit (advisory — does not block merge yet)
        run: pip-audit || true
